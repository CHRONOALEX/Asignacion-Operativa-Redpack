<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rendimiento Individual - Redpack</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --carbon-bg: #090909; 
            --carbon-surface: #141414;
            --guindo: #66001a; 
            --guindo-light: #990026;
            --accent: #3b82f6; 
            --text: #e2e8f0;
            --border: #2a2a2a;
            --gold: #c5a059;
            --drag-area-color: rgba(59, 130, 246, 0.5);
        }
        
        body { font-family: 'Lexend', sans-serif; background-color: var(--carbon-bg); margin: 0; color: var(--text); font-size: 13px; }

        .ultra-header {
            background: linear-gradient(145deg, #111, #1a0007);
            border-bottom: 2px solid var(--guindo);
            padding: 8px 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .brand { flex-shrink: 0; min-width: 120px; }
        .brand .title { font-size: 1.1em; font-weight: 800; color: #fff; margin: 0; letter-spacing: 1px; }
        .brand .subtitle { font-size: 0.6em; color: var(--gold); display: block; margin-top: -2px; white-space: nowrap; }

        .control-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.03);
            padding: 5px 8px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .field { display: flex; flex-direction: column; }
        .field label { font-size: 0.55em; color: var(--gold); text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }

        select, input[type="file"], input[type="text"], input[type="number"] { 
            background: #000; border: 1px solid #333; color: #fff; 
            padding: 2px 6px; border-radius: 4px; font-size: 10.5px; outline: none;
            height: 26px;
        }
        
        input[type="file"] { width: 150px; } 
        input[type="number"] { width: 75px; border-color: var(--guindo); font-weight: bold; }

        .btn-confirm {
            background: var(--guindo); color: white; border: 1px solid var(--guindo-light);
            padding: 0 10px; border-radius: 4px; cursor: pointer;
            font-weight: 600; font-size: 9px; height: 26px; align-self: flex-end;
            transition: 0.2s; text-transform: uppercase;
        }
        .btn-confirm:hover { background: var(--guindo-light); box-shadow: 0 0 10px var(--guindo); }
        .btn-confirm:disabled { background: #333; border-color: #444; cursor: not-allowed; opacity: 0.5; }

        .btn-config {
            background: #222; border: 1px solid #444; color: #aaa;
            padding: 0 8px; border-radius: 4px; cursor: pointer;
            height: 26px; align-self: flex-end; font-size: 12px;
        }

        .kpi-container { display: flex; gap: 5px; flex-wrap: wrap; }
        .kpi-pill {
            background: rgba(102, 0, 26, 0.2); border: 1px solid rgba(153, 0, 38, 0.3);
            padding: 3px 8px; border-radius: 6px; text-align: center; min-width: 50px;
        }
        .kpi-label { font-size: 0.5em; color: #aaa; text-transform: uppercase; display: block; }
        .kpi-val { font-size: 1em; font-weight: 600; color: #fff; line-height: 1; }

        #modalConfig {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--carbon-surface); border: 1px solid var(--guindo);
            padding: 20px; border-radius: 12px; width: 320px; max-height: 80vh; overflow-y: auto;
        }

        .main-content { padding: 15px; }
        .card { background: var(--carbon-surface); border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; overflow: hidden; }
        .card-header { background: #1a1a1a; padding: 8px 12px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); align-items: center; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #111; color: #777; font-size: 0.65em; text-transform: uppercase; padding: 8px; text-align: left; }
        td { padding: 6px 10px; border-bottom: 1px solid #1f1f1f; font-size: 11.5px; }

        .split-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .drag-zone { border-left: 2px solid var(--drag-area-color); cursor: crosshair; }
        .row-occupied { background: rgba(102, 0, 26, 0.15); pointer-events: none; opacity: 0.6; }
        .row-selecting { background: rgba(59, 130, 246, 0.4) !important; border-left: 3px solid var(--accent) !important; }
        
        #floatingAssignMenu {
            position: fixed; display: none; background: #1a1a1a; border: 2px solid var(--gold);
            padding: 10px; border-radius: 10px; z-index: 2000; flex-direction: column; gap: 8px;
            min-width: 160px; transform: translate(-50%, -50%); box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        }

        .table-select { background: #0a0a0a; border: 1px solid #444; color: #fff; font-size: 10px; padding: 2px; border-radius: 3px; }
        .copy-btn { background: var(--accent); border: none; color: white; padding: 5px 10px; border-radius: 4px; font-size: 9px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <header class="ultra-header">
        <div class="brand">
            <h1 class="title">REDPACK</h1>
            <span class="subtitle">RENDIMIENTO OPERATIVO</span>
        </div>

        <div class="control-group">
            <div class="field"><label>Excel</label><input type="file" id="excelInput" accept=".xlsx, .xls"></div>
            <div class="field">
                <label>PAQUETES PROCESADOS</label>
                <input type="number" id="numProcesados" placeholder="Total Real" oninput="validateReady()">
            </div>
            <div class="field"><label>Turno</label>
                <select id="selShift">
                    <option value="Día">Día</option>
                    <option value="Tarde">Tarde</option>
                    <option value="Noche" selected>Noche</option>
                </select>
            </div>
            <div class="field"><label>Picker</label><select id="selPicker"></select></div>
            <div class="field">
                <label>Tarea</label>
                <select id="selTaskType" onchange="toggleTaskInputs()">
                    <option value="MUELLE">Muelle</option>
                    <option value="Inyección">Inyección</option>
                    <option value="Etiquetado">Etiquetado</option>
                </select>
            </div>
            <div id="rangeInputs" style="display:flex; gap:5px;">
                <div class="field"><label>De</label><select id="selFrom" style="width:40px;" onchange="updateToOptions()"></select></div>
                <div class="field"><label>A</label><select id="selTo" style="width:40px;"></select></div>
            </div>
            <button id="btnConfirmMain" class="btn-confirm" onclick="assignPicker()" disabled>CONFIRMAR</button>
            <button class="btn-config" onclick="openModal()">⚙️</button>
        </div>

        <div class="kpi-container">
            <div class="kpi-pill"><span class="kpi-label">Jornada</span><span id="txtJornada" class="kpi-val" style="color:var(--gold)">-</span></div>
            <div class="kpi-pill"><span class="kpi-label">Rutas</span><span id="totalIdsCount" class="kpi-val">0</span></div>
            <div class="kpi-pill"><span class="kpi-label">Paquetes</span><span id="grandTotal" class="kpi-val" style="color:var(--guindo-light)">0</span></div>
            <div class="kpi-pill"><span class="kpi-label">Operadores</span><span id="totalPickersAssigned" class="kpi-val">0</span></div>
        </div>
    </header>

    <div id="floatingAssignMenu">
        <label style="font-size:10px; color:var(--gold); text-align:center; font-weight:800">ASIGNAR OPERADOR</label>
        <select id="floatPickerSel" class="table-select" style="width: 100%; height: 30px; border-color: var(--gold);"></select>
        <div style="display:flex; gap: 5px;">
            <button class="btn-confirm" onclick="confirmQuickAssign()" style="flex:2; height: 28px;">ASIGNAR</button>
            <button class="btn-confirm" onclick="cancelQuickAssign()" style="background:#222; flex:1; height: 28px; border-color:#444">X</button>
        </div>
    </div>

    <div id="modalConfig">
        <div class="modal-content">
            <h3 style="color:var(--gold); text-align:center">LISTA DE PICKERS</h3>
            <div id="editList" style="display:grid; gap:8px; margin-bottom:15px"></div>
            <button class="btn-confirm" onclick="addNewPickerInput()" style="background:#333; width:100%; margin-bottom:10px">+ AGREGAR</button>
            <div style="display:flex; gap:10px;">
                <button class="btn-confirm" onclick="savePickers()" style="flex:1">GUARDAR</button>
                <button class="btn-confirm" onclick="closeModal()" style="background:#222; flex:1">CERRAR</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <div class="card-header">
                <span style="font-size: 0.75em; font-weight: 600; color: var(--gold);">RESUMEN GENERAL POR TURNO</span>
                <button class="copy-btn" onclick="copySummaryTable()">📋 COPIAR DATOS</button>
            </div>
            <table id="summaryTable">
                <thead>
                    <tr>
                        <th style="width:8px"></th>
                        <th>Jornada</th>
                        <th>Fecha</th>
                        <th>Turno</th>
                        <th>Picker</th>
                        <th>Muelle(s)</th>
                        <th>Rutas</th>
                        <th>Paquetes</th>
                        <th style="color:var(--gold)">T. Turno</th>
                        <th>Prod. Real</th>
                        <th>% Rend</th>
                        <th>Proceso</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="summaryBody"></tbody>
            </table>
        </div>

        <div class="split-layout">
            <div class="card">
                <div class="card-header">
                    <span style="font-size:0.7em; color:#888;">BLOQUE A - P</span>
                    <div class="block-totals" style="display:flex; gap:10px; font-size:0.7em;"><span>IDs: <b id="idsLeft">0</b></span><span>M: <b id="muellesLeft">0</b></span></div>
                </div>
                <table>
                    <thead><tr><th style="width:4px"></th><th>Muelle</th><th>Picker</th><th>IDs</th><th>P.</th></tr></thead>
                    <tbody id="bodyLeft" class="unselectable"></tbody>
                </table>
            </div>
            <div class="card">
                <div class="card-header">
                    <span style="font-size:0.7em; color:#888;">BLOQUE AC - Q</span>
                    <div class="block-totals" style="display:flex; gap:10px; font-size:0.7em;"><span>IDs: <b id="idsRight">0</b></span><span>M: <b id="muellesRight">0</b></span></div>
                </div>
                <table>
                    <thead><tr><th style="width:4px"></th><th>Muelle</th><th>Picker</th><th>IDs</th><th>P.</th></tr></thead>
                    <tbody id="bodyRight" class="unselectable"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    const defaultPickers = ["Alejandra", "Alejandro", "Alexis", "Alexander", "Arturo", "Ernesto", "Comodin", "Frank", "Gerardo", "Israel", "Julian", "Karla", "Lupita", "Rebeca", "Samantha", "Samuel", "Wicho", "Antonio"];
    let allPickers = JSON.parse(localStorage.getItem('redpack_picker_list')) || defaultPickers;
    const colorPalette = ["#3b82f6", "#10b981", "#f59e0b", "#ef4444", "#8b5cf6", "#ec4899", "#06b6d4", "#f97316", "#84cc16", "#a855f7", "#14b8a6", "#fb7185", "#6366f1", "#d946ef", "#eab308", "#2dd4bf", "#4ade80", "#f472b6", "#60a5fa", "#fb923c"];
    const alphabet = ["A","B","C","D","E","F","G","H","I","J","K","L","M","N","O","P","AC","AB","AA","Z","Y","X","W","V","U","T","S","R","Q", "QP"];
    
    let assignments = []; let globalData = {}; let globalParadasTotal = 0; let globalIdsTotal = 0;
    let currentJornada = "-"; let currentFecha = "-"; let usedColors = [];
    let isDragging = false; let selectedLetters = [];
    const floatingMenu = document.getElementById('floatingAssignMenu');

    window.onload = () => { updateAllSelects(); renderTables(); initDragSelection(); };

    function validateReady() {
        const val = document.getElementById('numProcesados').value;
        const btn = document.getElementById('btnConfirmMain');
        btn.disabled = (!val || val <= 0);
        if(assignments.length > 0) renderSummary();
    }

    function initDragSelection() {
        const bodies = [document.getElementById('bodyLeft'), document.getElementById('bodyRight')];
        bodies.forEach(tbody => {
            tbody.addEventListener('mousedown', (e) => {
                if(document.getElementById('btnConfirmMain').disabled) {
                    alert("Anota paquetes procesados para asignar.");
                    return;
                }
                const tr = e.target.closest('tr');
                if (!tr || tr.classList.contains('row-occupied')) return;
                isDragging = true; selectedLetters = []; clearVisualSelection(); toggleSelection(tr);
            });
            tbody.addEventListener('mouseover', (e) => {
                if (!isDragging) return;
                const tr = e.target.closest('tr');
                if (!tr || tr.classList.contains('row-occupied')) return;
                toggleSelection(tr);
            });
        });
        window.addEventListener('mouseup', () => {
            if (isDragging && selectedLetters.length > 0) positionAndShowMenu();
            isDragging = false;
        });
    }

    function toggleSelection(tr) {
        const bTag = tr.querySelector('b');
        if (!bTag) return;
        const letter = bTag.textContent;
        if (!selectedLetters.includes(letter)) {
            selectedLetters.push(letter); tr.classList.add('row-selecting');
        } else if (selectedLetters.length > 1 && selectedLetters[selectedLetters.length-1] !== letter) {
            selectedLetters.splice(selectedLetters.indexOf(letter), 1); tr.classList.remove('row-selecting');
        }
    }

    function clearVisualSelection() { document.querySelectorAll('.row-selecting').forEach(el => el.classList.remove('row-selecting')); }

    function positionAndShowMenu() {
        const selectedEls = document.querySelectorAll('.row-selecting');
        if (selectedEls.length === 0) return;
        let minTop = Infinity, maxBottom = 0, centerX = 0;
        selectedEls.forEach(el => {
            const rect = el.getBoundingClientRect();
            if (rect.top < minTop) minTop = rect.top;
            if (rect.bottom > maxBottom) maxBottom = rect.bottom;
            centerX = rect.left + (rect.width / 2);
        });
        const floatSel = document.getElementById('floatPickerSel');
        const assignedNames = assignments.map(a => a.picker);
        floatSel.innerHTML = '<option value="">Elegir...</option>';
        allPickers.forEach(p => { if (!assignedNames.includes(p)) floatSel.innerHTML += `<option value="${p}">${p}</option>`; });
        floatingMenu.style.left = `${centerX}px`;
        floatingMenu.style.top = `${minTop + (maxBottom - minTop) / 2}px`;
        floatingMenu.style.display = 'flex';
    }

    function confirmQuickAssign() {
        const pickerName = document.getElementById('floatPickerSel').value;
        const shiftName = document.getElementById('selShift').value;
        if (!pickerName) return alert("Selecciona operario");
        selectedLetters.sort((a, b) => alphabet.indexOf(a) - alphabet.indexOf(b));
        const range = alphabet.slice(alphabet.indexOf(selectedLetters[0]), alphabet.indexOf(selectedLetters[selectedLetters.length - 1]) + 1);
        const color = colorPalette.find(c => !usedColors.includes(c)) || "#555";
        usedColors.push(color);
        let newAss = { 
            picker: pickerName, shift: shiftName, type: 'MUELLE', color: color, 
            ids: 0, paradas: 0, letters: range, display: range.join(", "), 
            jornada: currentJornada, fecha: currentFecha 
        };
        let idsSet = new Set();
        range.forEach(l => { if(globalData[l]) { globalData[l].ids.forEach(id => idsSet.add(id)); newAss.paradas += globalData[l].p; } });
        newAss.ids = idsSet.size; assignments.push(newAss);
        cancelQuickAssign(); updateAllSelects(); renderTables(); renderSummary();
    }

    function cancelQuickAssign() { floatingMenu.style.display = 'none'; selectedLetters = []; clearVisualSelection(); }

    function openModal() {
        document.getElementById('modalConfig').style.display = 'flex';
        const list = document.getElementById('editList'); list.innerHTML = "";
        allPickers.forEach((p) => { list.innerHTML += `<div style="display:flex;gap:5px"><input type="text" value="${p}" class="edit-p-input" style="flex:1"><button onclick="this.parentElement.remove()" style="color:red;background:none;border:none;cursor:pointer">✕</button></div>`; });
    }

    function addNewPickerInput() {
        const div = document.createElement('div'); div.style.display="flex"; div.style.gap="5px";
        div.innerHTML = `<input type="text" placeholder="Nuevo..." class="edit-p-input" style="flex:1"><button onclick="this.parentElement.remove()" style="color:red;background:none;border:none;cursor:pointer">✕</button>`;
        document.getElementById('editList').appendChild(div);
    }

    function savePickers() {
        const newList = []; document.querySelectorAll('.edit-p-input').forEach(i => { if(i.value.trim()) newList.push(i.value.trim()); });
        allPickers = newList; localStorage.setItem('redpack_picker_list', JSON.stringify(allPickers));
        closeModal(); updateAllSelects(); renderSummary();
    }

    function closeModal() { document.getElementById('modalConfig').style.display = 'none'; }

    function toggleTaskInputs() { document.getElementById('rangeInputs').style.display = (document.getElementById('selTaskType').value === 'MUELLE') ? 'flex' : 'none'; }

    function updateAllSelects() {
        const pSel = document.getElementById('selPicker'); const assignedNames = assignments.map(a => a.picker);
        pSel.innerHTML = ""; allPickers.forEach(p => { if (!assignedNames.includes(p)) pSel.innerHTML += `<option value="${p}">${p}</option>`; });
        const fromSel = document.getElementById('selFrom'); const occupiedLetters = assignments.flatMap(a => a.letters || []);
        fromSel.innerHTML = '<option value="">-</option>'; alphabet.forEach(l => { if (!occupiedLetters.includes(l)) fromSel.innerHTML += `<option value="${l}">${l}</option>`; });
        updateToOptions();
    }

    function updateToOptions() {
        const fromVal = document.getElementById('selFrom').value; const toSel = document.getElementById('selTo');
        const occupiedLetters = assignments.flatMap(a => a.letters || []);
        toSel.innerHTML = '<option value="">-</option>'; if(!fromVal) return;
        const startIdx = alphabet.indexOf(fromVal);
        for(let i = startIdx; i < alphabet.length; i++) { if(occupiedLetters.includes(alphabet[i]) && i !== startIdx) break; toSel.innerHTML += `<option value="${alphabet[i]}">${alphabet[i]}</option>`; }
    }

    document.getElementById('excelInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const workbook = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
            processData(XLSX.utils.sheet_to_json(workbook.Sheets["Viajes"]));
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function processData(rows) {
        globalData = {}; globalParadasTotal = 0; let uniqueIds = new Set(), jSet = new Set(), fSet = new Set();
        rows.forEach(row => {
            if(row["Jornada"]) { const parts = String(row["Jornada"]).split(" - "); if(parts[0]) jSet.add(parts[0].trim()); if(parts[1]) fSet.add(parts[1].trim()); }
            const id = row["ID"];
            const p = parseInt(row["# Paradas"]) || 0;
            const conductor = String(row["Conductor"] || "").trim();
            let muellesEfectivos = [];
            if (conductor === "CONDUCTOR QP CONDUCTOR QP") { muellesEfectivos = ["QP"]; } 
            else { const m = String(row["Muelle de salida"] || "").trim(); if(m) { muellesEfectivos = m.split(/[\s,]+/).filter(Boolean); } }
            if(id && muellesEfectivos.length > 0) {
                muellesEfectivos.forEach(l => {
                    const key = l.toUpperCase(); 
                    if(!globalData[key]) globalData[key] = { ids: [], p: 0 };
                    globalData[key].ids.push(id); globalData[key].p += p; 
                    globalParadasTotal += p; uniqueIds.add(id);
                });
            }
        });
        currentJornada = Array.from(jSet).join(", ") || "-"; 
        currentFecha = Array.from(fSet).join(", ") || "-";
        globalIdsTotal = uniqueIds.size; document.getElementById('txtJornada').textContent = currentJornada;
        document.getElementById('grandTotal').textContent = globalParadasTotal;
        document.getElementById('totalIdsCount').textContent = globalIdsTotal;
        
        document.getElementById('numProcesados').value = globalParadasTotal;
        validateReady();

        renderTables(); renderSummary();
    }

    function assignPicker() {
        const p = document.getElementById('selPicker').value, taskType = document.getElementById('selTaskType').value;
        const shift = document.getElementById('selShift').value;
        if(!p) return alert("Selecciona Picker");
        const color = colorPalette.find(c => !usedColors.includes(c)) || "#555"; usedColors.push(color);
        let newAss = { 
            picker: p, shift: shift, type: taskType, color: color, 
            ids: 0, paradas: 0, letters: [], display: taskType, jornada: currentJornada, fecha: currentFecha 
        };
        if(taskType === 'MUELLE') {
            const f = document.getElementById('selFrom').value, t = document.getElementById('selTo').value;
            if(!f || !t) return alert("Rango inválido");
            const range = alphabet.slice(alphabet.indexOf(f), alphabet.indexOf(t) + 1);
            let idsSet = new Set(); range.forEach(l => { if(globalData[l]) { globalData[l].ids.forEach(id => idsSet.add(id)); newAss.paradas += globalData[l].p; } });
            newAss.letters = range; newAss.ids = idsSet.size; newAss.display = range.join(", ");
        }
        assignments.push(newAss); updateAllSelects(); renderTables(); renderSummary();
    }

    function changePickerInSummary(idx, newName) { assignments[idx].picker = newName; renderTables(); updateAllSelects(); }

    function removeAss(idx) {
        usedColors = usedColors.filter(c => c !== assignments[idx].color);
        assignments.splice(idx, 1); updateAllSelects(); renderTables(); renderSummary();
    }

    function renderSummary() {
        const body = document.getElementById('summaryBody');
        const totalRealCaja = parseFloat(document.getElementById('numProcesados').value) || 0;
        
        if(assignments.length === 0) { body.innerHTML = '<tr><td colspan="13" style="text-align:center; color:#444; padding:20px">Sin datos...</td></tr>'; return; }
        body.innerHTML = "";
        const assignedNames = assignments.map(a => a.picker);
        const injCount = assignments.filter(a => a.type === 'Inyección').length;
        const etiCount = assignments.filter(a => a.type === 'Etiquetado').length;

        assignments.forEach((a, idx) => {
            let pickerOptions = "";
            allPickers.forEach(p => { if (!assignedNames.includes(p) || p === a.picker) pickerOptions += `<option value="${p}" ${p === a.picker ? 'selected' : ''}>${p}</option>`; });
            
            let produccionRealMostrada = 0;
            let porcentajeDesempeño = 0;

            if(globalParadasTotal > 0 && totalRealCaja > 0) {
                if(a.type === 'MUELLE') {
                    const proporcionExcel = a.paradas / globalParadasTotal;
                    produccionRealMostrada = Math.round(totalRealCaja * proporcionExcel);
                } else if (a.type === 'Inyección') {
                    produccionRealMostrada = Math.round(totalRealCaja / (injCount || 1));
                } else if (a.type === 'Etiquetado') {
                    produccionRealMostrada = Math.round(totalRealCaja / (etiCount || 1));
                }
                porcentajeDesempeño = ((produccionRealMostrada / totalRealCaja) * 100).toFixed(1);
            }

            body.innerHTML += `<tr>
                <td style="background-color:${a.color}"></td>
                <td style="color:#666">${a.jornada}</td>
                <td style="color:#666">${a.fecha}</td>
                <td style="font-weight:600; color:var(--gold)">${a.shift}</td>
                <td><select class="table-select" onchange="changePickerInSummary(${idx}, this.value)" style="color:${a.color}; font-weight:bold; width:100%">${pickerOptions}</select></td>
                <td style="font-weight:bold">${a.display}</td>
                <td style="color:var(--accent); font-weight:600">${a.type === 'MUELLE' ? a.ids : '-'}</td>
                <td style="color:var(--guindo-light); font-weight:600">${a.type === 'MUELLE' ? a.paradas : '-'}</td>
                <td style="color:var(--gold); font-weight:bold; text-align:center">${totalRealCaja}</td>
                <td style="color:#fff; font-weight:bold; background: rgba(59,130,246,0.1); text-align:center;">${produccionRealMostrada}</td>
                <td style="color:var(--gold); font-weight:bold; text-align:center">${porcentajeDesempeño}%</td>
                <td style="font-weight:600; color:#aaa">${a.type}</td>
                <td><button onclick="removeAss(${idx})" style="color:red;background:none;border:none;cursor:pointer">✕</button></td>
            </tr>`;
        });
        document.getElementById('totalPickersAssigned').textContent = assignments.length;
    }

    function renderTables() {
        let leftIds = new Set(), leftMuelles = 0, rightIds = new Set(), rightMuelles = 0;
        const draw = (tbodyId, range, isLeft) => {
            const tbody = document.getElementById(tbodyId); tbody.innerHTML = "";
            range.forEach(l => {
                const d = globalData[l] || { ids: [], p: 0 }, ass = assignments.find(a => (a.letters || []).includes(l));
                if(d.ids.length > 0) { if(isLeft) { d.ids.forEach(id => leftIds.add(id)); leftMuelles++; } else { d.ids.forEach(id => rightIds.add(id)); rightMuelles++; } }
                const tr = document.createElement('tr');
                if(ass) tr.className = "row-occupied"; else tr.className = "drag-zone"; 
                tr.innerHTML = `<td style="background-color:${ass ? ass.color : 'transparent'}"></td>
                    <td><b>${l}</b></td>
                    <td style="color:${ass ? ass.color : '#444'}; font-weight:600">${ass ? ass.picker : '-'}</td>
                    <td style="color:#555">${d.ids.length}</td>
                    <td style="text-align:right; font-weight:600">${d.p}</td>`;
                tbody.appendChild(tr);
            });
        };
        draw('bodyLeft', alphabet.slice(0, 16), true); draw('bodyRight', alphabet.slice(16), false);
        document.getElementById('idsLeft').textContent = leftIds.size; document.getElementById('muellesLeft').textContent = leftMuelles;
        document.getElementById('idsRight').textContent = rightIds.size; document.getElementById('muellesRight').textContent = rightMuelles;
    }

    function copySummaryTable() {
        let text = ""; 
        const totalRealCaja = parseFloat(document.getElementById('numProcesados').value) || 0;
        const injCount = assignments.filter(a => a.type === 'Inyección').length;
        const etiCount = assignments.filter(a => a.type === 'Etiquetado').length;

        assignments.forEach(a => { 
            let real = 0, pct = 0;
            if(globalParadasTotal > 0 && totalRealCaja > 0) {
                if(a.type === 'MUELLE') {
                    real = Math.round(totalRealCaja * (a.paradas / globalParadasTotal));
                } else if(a.type === 'Inyección') {
                    real = Math.round(totalRealCaja / (injCount || 1));
                } else if(a.type === 'Etiquetado') {
                    real = Math.round(totalRealCaja / (etiCount || 1));
                }
                pct = ((real / totalRealCaja) * 100).toFixed(1);
            }
            text += `${a.jornada}\t${a.fecha}\t${a.shift}\t${a.picker}\t${a.display}\t${a.ids}\t${a.paradas}\t${totalRealCaja}\t${real}\t${pct}%\t${a.type}\n`; 
        });
        
        if (text === "") return; 

        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.textContent = "✅ COPIADO";
            setTimeout(() => btn.textContent = "📋 COPIAR DATOS", 2000);
        });
    }
</script>
</body>
</html>
